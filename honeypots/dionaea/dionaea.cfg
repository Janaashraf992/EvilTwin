[dionaea]
download.dir=/opt/dionaea/var/lib/dionaea/binaries
modules=curl,python,nfq,emu,pcap
listen.mode=getifaddrs
listen.addresses=0.0.0.0
ssl.default.c=US
ssl.default.cn=localhost
ssl.default.o=EvilTwin Deception

[logging]
default.filename=/opt/dionaea/var/log/dionaea.log
default.levels=all,-debug
default.domains=*

[module.python]
imports=dionaea.sip,dionaea.ftp,dionaea.tftp,dionaea.http,dionaea.smb,dionaea.mssql,dionaea.log_json

[module.log_json]
handlers=log_json

[handler.log_json]
filename=/opt/dionaea/var/log/dionaea.json

# ---------------------------------------------------------------------------
# Service: FTP
# ---------------------------------------------------------------------------
[service.ftp]
root=/opt/dionaea/var/lib/dionaea/ftp
port=21

# ---------------------------------------------------------------------------
# Service: HTTP
# ---------------------------------------------------------------------------
[service.http]
root=/opt/dionaea/var/lib/dionaea/http
port=80
max-request-size=32768

# ---------------------------------------------------------------------------
# Service: SMB (Samba / Windows file sharing)
# ---------------------------------------------------------------------------
[service.smb]
port=445
os_type=2

# ---------------------------------------------------------------------------
# Service: MSSQL
# ---------------------------------------------------------------------------
[service.mssql]
port=1433

# ---------------------------------------------------------------------------
# Service: SIP (VoIP)
# ---------------------------------------------------------------------------
[service.sip]
port=5060
